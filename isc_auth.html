<style>
:root{
  --bg:#04060e;--bg2:#080c18;--card:#0c1120;
  --b1:#1a2240;--b2:#243060;
  --c1:#00f5c8;--c2:#7b61ff;--c3:#ff5f7e;--c4:#ffd060;
  --t1:#f0f6ff;--t2:#8899bb;--t3:#2a3a5a;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,200,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,200,.018) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

.orb{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none}
.orb1{width:500px;height:500px;background:rgba(123,97,255,.1);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(0,245,200,.07);bottom:-100px;right:-50px}

/* BACK LINK */
.back-link{position:fixed;top:24px;left:24px;display:flex;align-items:center;gap:8px;color:var(--t2);font-size:.85rem;text-decoration:none;transition:color .2s;z-index:10}
.back-link:hover{color:var(--c1)}

/* AUTH BOX */
.auth-container{position:relative;z-index:1;width:100%;max-width:460px;padding:24px}
.auth-box{background:var(--card);border:1px solid var(--b2);border-radius:24px;padding:44px 40px}

.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
.logo-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#000}
.brand{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.08em;color:var(--t1)}
.brand span{color:var(--c1)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--t2);background:transparent;transition:all .2s}
.tab.active{background:var(--b2);color:var(--t1)}

/* FORM */
.form-section{display:none}
.form-section.active{display:block}
.form-group{margin-bottom:16px}
label{display:block;font-size:.78rem;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
input{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--b1);border-radius:10px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--c1)}
input::placeholder{color:var(--t3)}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.divider span{font-size:.75rem;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase}

/* GOOGLE BUTTON */
.google-btn{
  width:100%;padding:13px;border-radius:10px;border:1px solid var(--b2);
  background:var(--bg2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;color:var(--t1);
  transition:all .2s;position:relative;overflow:hidden
}
.google-btn:hover{border-color:var(--c1);background:rgba(0,245,200,.05)}
.google-btn svg{flex-shrink:0}

/* DEV BYPASS */
.dev-bypass{
  width:100%;padding:12px;border-radius:10px;border:2px dashed rgba(255,208,96,.3);
  background:rgba(255,208,96,.05);cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;color:var(--c4);
  transition:all .2s;letter-spacing:.04em
}
.dev-bypass:hover{border-color:rgba(255,208,96,.6);background:rgba(255,208,96,.1)}
.dev-note{text-align:center;font-size:.7rem;color:var(--t3);margin-top:6px;font-family:'JetBrains Mono',monospace}

/* PRIMARY BTN */
.auth-btn{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:var(--c1);color:#000;font-family:'DM Sans',sans-serif;
  font-size:.9rem;font-weight:700;transition:all .2s;margin-top:4px
}
.auth-btn:hover{background:#00ddb4;transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,245,200,.25)}

/* FREE TRIAL CHIP */
.trial-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,245,200,.06);border:1px solid rgba(0,245,200,.2);border-radius:100px;
  padding:6px 14px;margin:0 auto 24px;
  font-size:.75rem;color:var(--c1);width:fit-content;font-family:'JetBrains Mono',monospace;
  letter-spacing:.06em;text-transform:uppercase
}
.trial-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--c1);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ERROR / SUCCESS */
.msg{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none}
.msg.error{background:rgba(255,95,126,.1);border:1px solid rgba(255,95,126,.3);color:#ff8fa3}
.msg.success{background:rgba(0,245,200,.1);border:1px solid rgba(0,245,200,.3);color:var(--c1)}
.msg.show{display:block}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(4,6,14,.95);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:3px solid var(--b2);border-top-color:var(--c1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--t2)}

/* GIS container hidden */
#g_id_onload{display:none}
</style>

<script>
// ══════════════════════════════════════════════════════
//  FIREBASE AUTH + FIRESTORE — Computer For All
//  Flow: Google Sign-In → save/fetch user doc in Firestore
//        doc has fields: name, email, picture, plan, createdAt
//        plan values: "free" (no timer, all unlocked) | "pro" (same) | "trial" (1hr timer)
// ══════════════════════════════════════════════════════

// ─── Save session to localStorage (used by platform page) ───
// trialStartedAt is a fixed timestamp from Firestore — never changes after first login
function startSession(user) {
  const session = {
    uid:             user.uid            || '',
    name:            user.name           || 'Student',
    email:           user.email          || '',
    picture:         user.picture        || '',
    plan:            user.plan           || 'trial',
    trialStartedAt:  user.trialStartedAt || Date.now(), // ← persisted, never reset
    trialDuration:   3600000  // 1 hour in ms
  };
  localStorage.setItem('cfa_session', JSON.stringify(session));
}

// ─── Create or fetch user document in Firestore ───
async function syncUserWithFirestore(firebaseUser) {
  const uid  = firebaseUser.uid;
  const ref  = db.collection('users').doc(uid);
  const snap = await ref.get();

  if (!snap.exists) {
    // Brand new user — record trialStartedAt once, permanently
    const now = Date.now();
    const newDoc = {
      uid,
      name:           firebaseUser.displayName || 'Student',
      email:          firebaseUser.email,
      picture:        firebaseUser.photoURL || '',
      plan:           'trial',
      trialStartedAt: now,   // ← set once, never overwritten
      createdAt:      firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(newDoc);
    return { ...newDoc };
  } else {
    const data = snap.data();
    // If somehow trialStartedAt is missing (legacy doc), add it now
    if (!data.trialStartedAt) {
      const now = Date.now();
      await ref.update({ trialStartedAt: now });
      return { ...data, trialStartedAt: now };
    }
    return data;
  }
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Signing you in...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

// ══════════════════════════════════════════════════════
//  GOOGLE SIGN-IN — Firebase signInWithPopup
//  Works on any domain (GitHub Pages, Netlify, etc.)
//  No GIS/origin registration needed beyond Firebase authDomain
// ══════════════════════════════════════════════════════
async function triggerGoogleSignIn() {
  showLoading('Connecting to Google...');
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const result = await auth.signInWithPopup(provider);
    await handleFirebaseUser(result.user);
  } catch(e) {
    hideLoading();
    console.error('Google sign-in error:', e);
    const activeMsg = document.getElementById('loginSection').classList.contains('active') ? 'loginMsg' : 'signupMsg';
    if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
      showMsg(activeMsg, 'Sign-in cancelled. Please try again.', 'error');
    } else {
      showMsg(activeMsg, 'Sign-in failed: ' + (e.message || 'Please try again.'), 'error');
    }
  }
}

// Shared handler after any Google sign-in method
async function handleFirebaseUser(fbUser) {
  showLoading('Fetching your profile...');
  const userData = await syncUserWithFirestore(fbUser);
  startSession({
    uid:            fbUser.uid,
    name:           userData.name    || fbUser.displayName,
    email:          userData.email   || fbUser.email,
    picture:        userData.picture || fbUser.photoURL || '',
    plan:           userData.plan    || 'trial',
    trialStartedAt: userData.trialStartedAt || Date.now()
  });
  hideLoading();
  window.location.href = 'isc_cs_platform.html';
}

// ══════════════════════════════════════════════════════
//  DEVELOPER BYPASS (creates a fake Firestore-free session)
// ══════════════════════════════════════════════════════
function devBypass() {
  showLoading('Dev bypass — entering platform...');
  setTimeout(() => {
    startSession({
      uid:     'dev-bypass-uid',
      name:    'Dev User',
      email:   'dev@computerforall.local',
      picture: '',
      plan:    'free'    // ← change to "trial" or "pro" to test different states
    });
    hideLoading();
    window.location.href = 'isc_cs_platform.html';
  }, 600);
}

// ══════════════════════════════════════════════════════
//  EMAIL / PASSWORD AUTH (via Firebase Auth)
// ══════════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('loginMsg', 'Please fill in all fields.', 'error'); return; }
  showLoading('Logging in...');
  try {
    const result = await auth.signInWithEmailAndPassword(email, pass);
    const userData = await syncUserWithFirestore(result.user);
    startSession({
      uid:            result.user.uid,
      name:           userData.name,
      email:          userData.email,
      picture:        userData.picture || '',
      plan:           userData.plan || 'trial',
      trialStartedAt: userData.trialStartedAt || Date.now()
    });
    hideLoading();
    window.location.href = 'isc_cs_platform.html';
  } catch(e) {
    hideLoading();
    showMsg('loginMsg', e.code === 'auth/user-not-found' ? 'No account found. Please sign up.' :
      e.code === 'auth/wrong-password' ? 'Incorrect password.' : e.message, 'error');
  }
}

async function doSignup() {
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPass').value;
  if (!name || !email || !pass) { showMsg('signupMsg', 'Please fill in all fields.', 'error'); return; }
  if (pass.length < 6) { showMsg('signupMsg', 'Password must be at least 6 characters.', 'error'); return; }
  showLoading('Creating your account...');
  try {
    const result = await auth.createUserWithEmailAndPassword(email, pass);
    await result.user.updateProfile({ displayName: name });
    // Create Firestore doc manually since displayName isn't set before syncUser
    const trialStartedAt = Date.now();
    await db.collection('users').doc(result.user.uid).set({
      uid:            result.user.uid,
      name,
      email,
      picture:        '',
      plan:           'trial',
      trialStartedAt,
      createdAt:      firebase.firestore.FieldValue.serverTimestamp()
    });
    startSession({ uid: result.user.uid, name, email, picture: '', plan: 'trial', trialStartedAt });
    hideLoading();
    window.location.href = 'isc_cs_platform.html';
  } catch(e) {
    hideLoading();
    showMsg('signupMsg', e.code === 'auth/email-already-in-use' ? 'Account already exists. Please log in.' : e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
//  TAB SWITCH
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (tab==='login' && i===0) || (tab==='signup' && i===1)));
  document.getElementById('loginSection').classList.toggle('active', tab==='login');
  document.getElementById('signupSection').classList.toggle('active', tab==='signup');
}

// ══════════════════════════════════════════════════════
//  AUTO-REDIRECT IF ALREADY LOGGED IN (Firebase listener)
// ══════════════════════════════════════════════════════
auth.onAuthStateChanged(async (firebaseUser) => {
  if (firebaseUser) {
    const sess = localStorage.getItem('cfa_session');
    if (sess) {
      // Valid session already in localStorage — just redirect
      window.location.href = 'isc_cs_platform.html';
    } else {
      // Firebase still logged in but localStorage was cleared — re-sync
      await handleFirebaseUser(firebaseUser);
    }
  }
});
</script>
